# .tmux.conf of deanbodenham, based on others (see below)
# last modified: 1 November 2017
# Updated for tmux 3.x compatibility

#Priority: prefix key and reloading tmux.conf:
#-------------------------------------------------------#
unbind C-b
set -g prefix C-a

bind C-a send-prefix

bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

#-------------------------------------------------------#

#Create R development environment with multiple windows
#-------------------------------------------------------#
bind F4 \
         select-window -t :=1 \;\
         rename-window 'bash' \;\
         split-window -h -c '#{pane_current_path}' \;\
         split-window -v -c '#{pane_current_path}' \;\
         new-window -c '#{pane_current_path}' \;\
         rename-window 'python' \;\
         new-window -c '#{pane_current_path}' \;\
         rename-window 'model' \;\
         new-window -c '#{pane_current_path}' \;\
         rename-window 'exp' \;\
         new-window -c '#{pane_current_path}' \;\
         rename-window 'git' \;\
         select-window -t :=1 \;\
         display "development environment created"

#-------------------------------------------------------#

bind -r b previous-window
bind -r n next-window
bind -r p last-window

#-------------------------------------------------------#

set -g mouse on

# 256 colours
set -g default-terminal "tmux-256color"

# start with window 1
set -g base-index 1

# start with pane 1
set -g pane-base-index 1

# use vi mode
setw -g mode-keys vi
set -g status-keys vi

#-------------------------------------------------------#
# PANE COLOURS
#-------------------------------------------------------#

set -g window-style 'fg=colour247,bg=colour235'
set -g window-active-style 'fg=colour250,bg=black'

# Modern replacements for deprecated border options
set -g pane-border-style 'fg=colour238,bg=colour235'
set -g pane-active-border-style 'fg=colour51,bg=colour236'

#-------------------------------------------------------#
# PANE NAVIGATION/MANAGEMENT
#-------------------------------------------------------#

bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

bind c new-window -c '#{pane_current_path}'

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

bind -r j select-pane -D
bind -r k select-pane -U
bind -r h select-pane -L
bind -r l select-pane -R

#-------------------------------------------------------#
# Pane copy/pasting
#-------------------------------------------------------#

bind C-v paste-buffer

#-------------------------------------------------------#
# Setting escape time delay
#-------------------------------------------------------#

set -s escape-time 1

#-------------------------------------------------------#
# STATUS LINE / MESSAGES
#-------------------------------------------------------#

set -g status-bg black

setw -g monitor-activity on
set -g visual-activity on

# Modern replacement for deprecated message options
set -g message-style 'fg=white,bg=default,bold'

#-------------------------------------------------------#
# Status line left side
#-------------------------------------------------------#

set -g status-left-length 40
set -g status-left "#[fg=colour245] #S #[fg=colour84]#I #[fg=colour75]#P"

#-------------------------------------------------------#
# Window/pane type in centre
#-------------------------------------------------------#

set -g status-justify centre

# Modern replacement for deprecated window status options
setw -g window-status-style 'fg=colour75,bg=default,dim'

#-------------------------------------------------------#
# Time and date on right-hand side
#-------------------------------------------------------#

set -g status-right "#[fg=colour245]%d %b #[fg=colour256] %R"

set -g status-interval 60

#-------------------------------------------------------#
# tmux resurrect (disabled)
#-------------------------------------------------------#

unbind-key -T prefix C-s
unbind-key -T prefix C-r

#-------------------------------------------------------#
# macOS support
#-------------------------------------------------------#

if-shell 'test "$(uname)" = "Darwin"' 'source ~/.tmux-osx.conf'

#-------------------------------------------------------#
# LaTeX additions remain commented out exactly as before
#-------------------------------------------------------#
